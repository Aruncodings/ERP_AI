apiVersion: 1

groups:
  - orgId: 1
    name: ERP Backend Alerts
    folder: ERP Alerts
    interval: 1m
    rules:
      # ─── Alert 1: Average end-to-end query latency exceeds 31.5 seconds ──────
      - uid: erp-latency-threshold
        title: "ERP Query Latency > 31.5s"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: rate(erp_query_duration_seconds_sum[5m])
              instant: true
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: rate(erp_query_duration_seconds_count[5m])
              instant: true
              range: false
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [31.5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: $A / $B
              refId: C
              type: math
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "ERP average query latency exceeded 31.5s"
          description: "Average end-to-end query latency has been above 31.5s for over 1 minute."
        labels:
          severity: warning
          team: erp-backend
        isPaused: false

      # ─── Alert 2: Any pipeline stage average exceeds 31.5 seconds ────────────
      - uid: erp-stage-threshold
        title: "ERP Pipeline Stage Duration > 31.5s"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: erp_query_stage_duration_seconds_sum / erp_query_stage_duration_seconds_count
              instant: true
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [31.5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "ERP stage '{{ $labels.stage }}' exceeded 31.5s"
          description: "Pipeline stage '{{ $labels.stage }}' average duration crossed 31.5s threshold."
        labels:
          severity: critical
          team: erp-backend
        isPaused: false
